<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SnakeCharmer{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong>SnakeCharmer</strong></li>
        </ul>
        <ul>
            <li><a href="/" {% if active_page == "dashboard" %}aria-current="page"{% endif %}>Dashboard</a></li>
            <li><a href="/config/trakt" {% if active_page == "trakt" %}aria-current="page"{% endif %}>Trakt</a></li>
            <li><a href="/config/medusa" {% if active_page == "medusa" %}aria-current="page"{% endif %}>Medusa</a></li>
            <li><a href="/config/sync" {% if active_page == "sync" %}aria-current="page"{% endif %}>Sync</a></li>
            <li><a href="/config/health" {% if active_page == "health" %}aria-current="page"{% endif %}>Health</a></li>
            <li><a href="/config/notify" {% if active_page == "notify" %}aria-current="page"{% endif %}>Notify</a></li>
        </ul>
    </nav>
    <main class="container">
        <div id="result-banner"></div>
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <small>SnakeCharmer Web UI &mdash; Config changes are written to the YAML file. Comments in the file will be removed on save.<br>SnakeCharmer is free and open source. <a href="https://github.com/sponsors/2wenty2wo" target="_blank">Support development</a>.</small>
    </footer>
</body>
</html>
