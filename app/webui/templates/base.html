<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>{% block title %}SnakeCharmer{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo"><span class="logo-icon">&#129415;</span> SnakeCharmer</div>
            <nav class="sidebar-nav">
                <a href="/" {% if active_page == "dashboard" %}class="active"{% endif %}>Dashboard</a>
                <a href="/config/trakt" {% if active_page == "trakt" %}class="active"{% endif %}>Trakt</a>
                <a href="/config/medusa" {% if active_page == "medusa" %}class="active"{% endif %}>Medusa</a>
                <a href="/config/sync" {% if active_page == "sync" %}class="active"{% endif %}>Sync</a>
                <a href="/config/health" {% if active_page == "health" %}class="active"{% endif %}>Health</a>
                <a href="/config/notify" {% if active_page == "notify" %}class="active"{% endif %}>Notify</a>
                <a href="/sync/history" {% if active_page == "history" %}class="active"{% endif %}>History</a>
                <a href="/library" {% if active_page == "library" %}class="active"{% endif %}>Library</a>
            </nav>
        </aside>
        <main class="main-content">
            <div id="result-banner"></div>
            <div id="dirty-indicator" class="info-label status-badge status-unknown" hidden>Unsaved changes</div>
            {% block content %}{% endblock %}
            <footer class="app-footer">
                <small>Config changes are written to the YAML file. Comments in the file will be removed on save.<br>SnakeCharmer is free and open source. <a href="https://github.com/sponsors/2wenty2wo" target="_blank">Support development</a>.</small>
            </footer>
        </main>
    </div>
    <script>
    document.body.addEventListener("htmx:afterSwap", function(event) {
        if (event.detail.target.id === "result-banner") {
            var banner = event.detail.target.querySelector(".banner");
            if (banner && banner.classList.contains("success")) {
                setTimeout(function() {
                    banner.classList.add("fade-out");
                    setTimeout(function() { banner.remove(); }, 400);
                }, 4000);
            }
        }
    });

    (function() {
        var configPathPattern = /^\/config\/[^/]+$/;
        var traktSourcesPathPattern = /^\/config\/trakt\/sources(?:\/|$)/;
        var isConfigPage = configPathPattern.test(window.location.pathname);
        if (!isConfigPage) {
            return;
        }

        var dirty = false;
        var dirtyIndicator = document.getElementById("dirty-indicator");
        var baselineState = "";

        function getActiveConfigForm() {
            return document.querySelector('form[hx-post="' + window.location.pathname + '"]');
        }

        function serializeFormState(form) {
            if (!form) {
                return "";
            }

            var formData = new FormData(form);
            var entries = [];
            formData.forEach(function(value, key) {
                var normalizedValue = value instanceof File ? value.name : String(value);
                entries.push([key, normalizedValue]);
            });
            entries.sort(function(a, b) {
                if (a[0] !== b[0]) {
                    return a[0] < b[0] ? -1 : 1;
                }
                if (a[1] === b[1]) {
                    return 0;
                }
                return a[1] < b[1] ? -1 : 1;
            });

            return entries
                .map(function(entry) { return encodeURIComponent(entry[0]) + "=" + encodeURIComponent(entry[1]); })
                .join("&");
        }

        function getCurrentState() {
            return serializeFormState(getActiveConfigForm());
        }

        function setDirty(value) {
            dirty = value;
            if (dirtyIndicator) {
                dirtyIndicator.hidden = !dirty;
            }
        }

        function syncDirtyState() {
            setDirty(getCurrentState() !== baselineState);
        }

        function setBaselineToCurrentState() {
            baselineState = getCurrentState();
        }

        function markDirty(event) {
            var form = event.target.closest("form");
            if (!form || !configPathPattern.test(form.getAttribute("hx-post") || "")) {
                return;
            }
            var currentState = getCurrentState();
            var hasStateDiff = currentState !== baselineState;
            if (!event.isTrusted && !hasStateDiff) {
                return;
            }
            setDirty(hasStateDiff);
        }

        setBaselineToCurrentState();
        setDirty(false);

        document.body.addEventListener("input", markDirty);
        document.body.addEventListener("change", markDirty);

        document.body.addEventListener("htmx:afterRequest", function(event) {
            var detail = event.detail || {};
            var requestPath = detail.pathInfo && detail.pathInfo.requestPath;
            if (!requestPath) {
                return;
            }
            if (requestPath === window.location.pathname && detail.successful) {
                setBaselineToCurrentState();
                setDirty(false);
            }
        });

        document.body.addEventListener("htmx:afterSettle", function(event) {
            var detail = event.detail || {};
            var requestPath = detail.pathInfo && detail.pathInfo.requestPath;
            if (!requestPath) {
                return;
            }
            if (traktSourcesPathPattern.test(requestPath)) {
                syncDirtyState();
            }
        });

        window.addEventListener("beforeunload", function(event) {
            if (!dirty) {
                return;
            }
            event.preventDefault();
            event.returnValue = "";
        });
    })();
    </script>
</body>
</html>
