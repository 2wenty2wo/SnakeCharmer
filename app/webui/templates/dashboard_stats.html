<div class="card stats-card"
     id="dashboard-stats-poller"
     hx-get="/dashboard/stats"
     hx-trigger="every 30s"
     hx-swap="outerHTML">
    <div class="stats-card-inner">
        <div class="stats-card-hero">
            <span class="stats-card-value">{{ stats.library_count if stats.library_count is not none else "—" }}</span>
            <span class="stats-card-label">In Library</span>
        </div>
        <div class="stats-card-grid">
            <div class="stats-card-mini">
                <span class="stats-card-mini-value">{{ stats.total_added }}</span>
                <span class="stats-card-mini-label">Shows Added</span>
            </div>
            <div class="stats-card-mini">
                <span class="stats-card-mini-value">{{ stats.total_runs }}</span>
                <span class="stats-card-mini-label">Total Syncs</span>
            </div>
            <div class="stats-card-mini">
                <span class="stats-card-mini-value">{{ stats.success_rate }}%</span>
                <span class="stats-card-mini-label">Success Rate</span>
            </div>
            <div class="stats-card-mini">
                <span class="stats-card-mini-value">{{ stats.pending_count }}</span>
                <span class="stats-card-mini-label">Pending</span>
            </div>
        </div>
    </div>
</div>
