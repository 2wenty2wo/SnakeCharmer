{% extends "base.html" %}
{% block title %}Notification Configuration - SnakeCharmer{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Notification Configuration</h1>
    <p class="page-description">Set up notifications for sync events via Pushover, Discord, Telegram, and 100+ services.</p>
</div>

<form class="form-config" hx-post="/config/notify" hx-target="#result-banner" hx-swap="innerHTML" id="notify-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-grid">
    <fieldset>
        <legend>Notification Settings</legend>

        <label class="field-label">
            <input type="checkbox" name="enabled" {{ "checked" if config.notify.enabled }}>
            <span>Enable Notifications</span>
            <small>Send notifications after each sync cycle completes</small>
        </label>

        <label class="field-label">
            Apprise URLs
            <textarea name="urls"
                      rows="5"
                      placeholder="pushover://user@token&#10;discord://webhook_id/webhook_token&#10;telegram://bottoken/chatid"
                      aria-describedby="urls-help">{{ config.notify.urls | join('\n') }}</textarea>
            <small id="urls-help">
                One Apprise URL per line. Supports 100+ notification services including Pushover, Discord, Telegram, ntfy, Slack, and more.<br>
                <a href="https://github.com/caronc/apprise/wiki#notification-services" target="_blank" rel="noopener noreferrer">View all supported services →</a>
            </small>
        </label>
    </fieldset>

    <fieldset>
        <legend>Notification Triggers</legend>

        <label class="field-label">
            <input type="checkbox" name="on_success" {{ "checked" if config.notify.on_success }}>
            <span>Notify on Success</span>
            <small>Send a notification when a sync completes successfully</small>
        </label>

        <label class="field-label">
            <input type="checkbox" name="on_failure" {{ "checked" if config.notify.on_failure }}>
            <span>Notify on Failure</span>
            <small>Send a notification when a sync fails or encounters errors</small>
        </label>

        <label class="field-label">
            <input type="checkbox" name="only_if_added" {{ "checked" if config.notify.only_if_added }}>
            <span>Only If Shows Added</span>
            <small>Suppress success notifications when no new shows were added (still sends on failure)</small>
        </label>
    </fieldset>
    </div>
    
    <div class="page-actions">
        <button type="submit">
            <i data-lucide="save" style="width:16px;height:16px"></i>
            Save Notification Settings
        </button>
        <button type="button" class="btn-secondary"
                hx-post="/test/notify"
                hx-target="#result-banner"
                hx-swap="innerHTML"
                hx-include="[name='csrf_token'],[name='urls']"
                {% if not config.notify.urls %}disabled title="Add notification URLs first"{% endif %}>
            <i data-lucide="send" style="width:14px;height:14px"></i>
            Send Test
        </button>
    </div>
</form>
{% endblock %}
