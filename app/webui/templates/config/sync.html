{% extends "base.html" %}
{% block title %}Sync Config - SnakeCharmer{% endblock %}
{% block content %}
<h1>Sync Configuration</h1>

<form hx-post="/config/sync" hx-target="#result-banner" hx-swap="innerHTML">
    <label>
        <input type="checkbox" name="dry_run" {{ "checked" if config.sync.dry_run }}>
        Dry Run
        <small>Preview changes without adding shows to Medusa</small>
    </label>
    <label>
        Interval (seconds)
        <input type="number" name="interval" value="{{ config.sync.interval }}" min="0">
        <small>Seconds between sync cycles. 0 = run once and exit.</small>
    </label>
    <label>
        Max Retries
        <input type="number" name="max_retries" value="{{ config.sync.max_retries }}" min="0" max="10">
        <small>Max retry attempts for transient API failures</small>
    </label>
    <label>
        Retry Backoff
        <input type="number" name="retry_backoff" value="{{ config.sync.retry_backoff }}" min="0.1" max="30" step="0.1">
        <small>Base backoff multiplier in seconds between retries</small>
    </label>
    <label>
        Log Format
        <select name="log_format">
            <option value="text" {{ "selected" if config.sync.log_format == "text" }}>Text</option>
            <option value="json" {{ "selected" if config.sync.log_format == "json" }}>JSON</option>
        </select>
        <small>Text is human-readable; JSON works with log aggregators</small>
    </label>
    <button type="submit">Save Sync Settings</button>
</form>
{% endblock %}
