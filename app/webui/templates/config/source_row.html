{% set i = index %}
<div class="source-row" id="source-{{ i }}">
    <div class="source-header">
        <span class="source-number">Source {{ i + 1 }}</span>
        <div class="inline-action-row">
            <button type="button" class="btn-secondary"
                    hx-post="/config/trakt/sources/preview"
                    hx-target="#preview-{{ i }}"
                    hx-swap="innerHTML"
                    hx-include="[name='client_id'],[name='client_secret'],[name='username'],[name='limit'],[name='source_{{ i }}_type'],[name='source_{{ i }}_owner'],[name='source_{{ i }}_list_slug'],[name='source_{{ i }}_auth']"
                    hx-vals='{"source_index": "{{ i }}"}'>
                Preview
            </button>
            <button type="button" class="btn-remove"
                    hx-delete="/config/trakt/sources/{{ i }}"
                    hx-target="#source-{{ i }}"
                    hx-swap="outerHTML"
                    hx-confirm="Remove this source?">
                Remove
            </button>
        </div>
    </div>
    <div class="source-grid">
        <label class="field-label">
            Type
            <select name="source_{{ i }}_type" onchange="toggleSourceFields(this, {{ i }})">
                <option value="trending" {{ "selected" if source.type == "trending" }}>Trending</option>
                <option value="popular" {{ "selected" if source.type == "popular" }}>Popular</option>
                <option value="watched" {{ "selected" if source.type == "watched" }}>Watched</option>
                <option value="watchlist" {{ "selected" if source.type == "watchlist" }}>Watchlist</option>
                <option value="user_list" {{ "selected" if source.type == "user_list" }}>User List</option>
            </select>
        </label>
        <div id="source_{{ i }}_user_list_fields" class="visibility-wrapper{{ '' if source.type == 'user_list' else ' is-hidden' }}">
            <label class="field-label">
                Owner
                <input type="text" name="source_{{ i }}_owner" value="{{ source.owner }}" placeholder="List owner username">
            </label>
            <label class="field-label">
                List Slug
                <input type="text" name="source_{{ i }}_list_slug" value="{{ source.list_slug }}" placeholder="list-slug">
            </label>
        </div>
    </div>
    <div class="source-grid">
        <label class="field-label">
            <input type="checkbox" name="source_{{ i }}_auth" {{ "checked" if source.auth }}>
            Requires OAuth
        </label>
        <label class="field-label">
            Quality
            <select name="source_{{ i }}_quality">
                <option value="">-- Select quality --</option>
                <option value="any" {{ "selected" if source.medusa.quality == "any" }}>Any</option>
                <option value="sd" {{ "selected" if source.medusa.quality == "sd" }}>SD</option>
                <option value="hd" {{ "selected" if source.medusa.quality == "hd" }}>HD</option>
                <option value="hd720p" {{ "selected" if source.medusa.quality == "hd720p" }}>HD 720p</option>
                <option value="hd1080p" {{ "selected" if source.medusa.quality == "hd1080p" }}>HD 1080p</option>
                <option value="uhd4k" {{ "selected" if source.medusa.quality == "uhd4k" }}>UHD 4K</option>
                <option value="uhd8k" {{ "selected" if source.medusa.quality == "uhd8k" }}>UHD 8K</option>
            </select>
            <small>Quality preset for shows added from this source</small>
        </label>
        <label class="field-label">
            Required Words
            <input type="text" name="source_{{ i }}_required_words"
                   value="{{ source.medusa.required_words | join(', ') if source.medusa.required_words else '' }}"
                   placeholder="e.g. web-dl, proper">
            <small>Comma-separated keywords</small>
        </label>
    </div>
    <div id="preview-{{ i }}"></div>
</div>
<script>
function toggleSourceFields(select, index) {
    var fields = document.getElementById('source_' + index + '_user_list_fields');
    if (select.value === 'user_list') {
        fields.classList.remove('is-hidden');
    } else {
        fields.classList.add('is-hidden');
    }
}

function addQuality(index, value) {
    var input = document.getElementById('quality-' + index);
    var current = input.value.trim();
    var values = current ? current.split(',').map(function(v) { return v.trim(); }) : [];
    if (!values.includes(value)) {
        values.push(value);
        input.value = values.join(', ');
    }
}
</script>
