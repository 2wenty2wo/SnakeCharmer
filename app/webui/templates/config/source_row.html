{% set i = index %}
<div class="source-row" id="source-{{ i }}">
    <div class="source-header">
        <span class="source-number">Source {{ i + 1 }}</span>
        <div class="inline-action-row">
            <button type="button" class="btn-secondary btn-small"
                    hx-post="/config/trakt/sources/preview"
                    hx-target="#preview-{{ i }}"
                    hx-swap="innerHTML"
                    hx-include="[name='csrf_token'],[name='client_id'],[name='client_secret'],[name='username'],[name='limit'],[name='source_{{ i }}_type'],[name='source_{{ i }}_owner'],[name='source_{{ i }}_list_slug'],[name='source_{{ i }}_auth'],[name='source_{{ i }}_auto_approve'],[name='source_{{ i }}_quality'],[name='source_{{ i }}_required_words'],[name='source_{{ i }}_blacklisted_genres'],[name='source_{{ i }}_blacklisted_networks'],[name='source_{{ i }}_blacklisted_min_year'],[name='source_{{ i }}_blacklisted_max_year'],[name='source_{{ i }}_blacklisted_title_keywords'],[name='source_{{ i }}_blacklisted_tvdb_ids'],[name='source_{{ i }}_allowed_countries'],[name='source_{{ i }}_allowed_languages']"
                    hx-vals='{"source_index": "{{ i }}"}'
                    title="Preview shows from this source">
                <i data-lucide="eye" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-right:4px"></i>
                Preview
            </button>
            <button type="button" class="btn-remove"
                    hx-delete="/config/trakt/sources/{{ i }}"
                    hx-target="#source-{{ i }}"
                    hx-swap="outerHTML"
                    hx-confirm="Remove this source?"
                    title="Remove this source">
                <i data-lucide="trash-2" style="width:14px;height:14px;display:inline;vertical-align:middle;margin-right:4px"></i>
                Remove
            </button>
        </div>
    </div>
    
    <div class="source-grid">
        <label class="field-label">
            Source Type
            <select name="source_{{ i }}_type" onchange="toggleSourceFields(this, {{ i }})" aria-describedby="type-help-{{ i }}">
                <option value="trending" {{ "selected" if source.type == "trending" }}>Trending</option>
                <option value="popular" {{ "selected" if source.type == "popular" }}>Popular</option>
                <option value="watched" {{ "selected" if source.type == "watched" }}>Watched</option>
                <option value="watchlist" {{ "selected" if source.type == "watchlist" }}>Watchlist</option>
                <option value="user_list" {{ "selected" if source.type == "user_list" }}>User List</option>
            </select>
            <small id="type-help-{{ i }}">Where to fetch shows from</small>
        </label>
        
        <div id="source_{{ i }}_user_list_fields" class="visibility-wrapper{{ '' if source.type == 'user_list' else ' is-hidden' }}">
            <label class="field-label">
                List Owner
                <input type="text" 
                       name="source_{{ i }}_owner" 
                       value="{{ source.owner }}" 
                       placeholder="Trakt username"
                       aria-describedby="owner-help-{{ i }}">
                <small id="owner-help-{{ i }}">Username of the list owner</small>
            </label>
            <label class="field-label">
                List Slug
                <input type="text" 
                       name="source_{{ i }}_list_slug" 
                       value="{{ source.list_slug }}" 
                       placeholder="my-awesome-list"
                       aria-describedby="slug-help-{{ i }}">
                <small id="slug-help-{{ i }}">The list URL slug</small>
            </label>
        </div>
    </div>
    
    <div class="source-grid source-grid--checkboxes">
        <label class="field-label field-label--checkbox">
            <input type="checkbox" name="source_{{ i }}_auth" {{ "checked" if source.auth }}>
            <span>Requires OAuth</span>
            <small>Check if this source requires authentication (watchlist, private lists)</small>
        </label>
        
        <label class="field-label field-label--checkbox">
            <input type="checkbox" name="source_{{ i }}_auto_approve" {{ "checked" if source.auto_approve }}>
            <span>Auto-approve Shows</span>
            <small>If unchecked, shows go to the <a href="/pending">pending queue</a> for manual approval</small>
        </label>
    </div>
    
    <div class="source-grid">
        <label class="field-label">
            Quality Preset
            <input type="text"
                   name="source_{{ i }}_quality"
                   value="{{ source.medusa.quality | join(', ') if source.medusa.quality is iterable and source.medusa.quality is not string else source.medusa.quality or '' }}"
                   placeholder="e.g. hd1080p, uhd4k"
                   aria-describedby="quality-help-{{ i }}">
            <small id="quality-help-{{ i }}">Quality preset or comma-separated values (any, sd, hd, hd720p, hd1080p, uhd4k, uhd8k)</small>
        </label>
        
        <label class="field-label">
            Required Words
            <input type="text" 
                   name="source_{{ i }}_required_words"
                   value="{{ source.medusa.required_words | join(', ') if source.medusa.required_words else '' }}"
                   placeholder="e.g. web-dl, proper, repack"
                   aria-describedby="words-help-{{ i }}">
            <small id="words-help-{{ i }}">Comma-separated keywords that releases must contain</small>
        </label>
    </div>
    
    <div class="source-filters">
        <div class="source-filters-header">Filters</div>
        <div class="source-grid">
            <label class="field-label">
                Blacklisted Genres
                <input type="text"
                       name="source_{{ i }}_blacklisted_genres"
                       value="{{ source.filters.blacklisted_genres | join(', ') if source.filters.blacklisted_genres else '' }}"
                       placeholder="e.g. reality, talk-show, anime"
                       aria-describedby="bg-help-{{ i }}">
                <small id="bg-help-{{ i }}">Comma-separated genres to exclude</small>
            </label>
            <label class="field-label">
                Blacklisted Networks
                <input type="text"
                       name="source_{{ i }}_blacklisted_networks"
                       value="{{ source.filters.blacklisted_networks | join(', ') if source.filters.blacklisted_networks else '' }}"
                       placeholder="e.g. youtube, twitch, espn"
                       aria-describedby="bn-help-{{ i }}">
                <small id="bn-help-{{ i }}">Comma-separated networks to exclude</small>
            </label>
        </div>
        <div class="source-grid">
            <label class="field-label">
                Min Year
                <input type="number"
                       name="source_{{ i }}_blacklisted_min_year"
                       value="{{ source.filters.blacklisted_min_year if source.filters.blacklisted_min_year is not none else '' }}"
                       placeholder="e.g. 2010"
                       aria-describedby="bmy-help-{{ i }}">
                <small id="bmy-help-{{ i }}">Skip shows released before this year</small>
            </label>
            <label class="field-label">
                Max Year
                <input type="number"
                       name="source_{{ i }}_blacklisted_max_year"
                       value="{{ source.filters.blacklisted_max_year if source.filters.blacklisted_max_year is not none else '' }}"
                       placeholder="e.g. 2020"
                       aria-describedby="bmaxy-help-{{ i }}">
                <small id="bmaxy-help-{{ i }}">Skip shows released after this year</small>
            </label>
        </div>
        <div class="source-grid">
            <label class="field-label">
                Blacklisted Title Keywords
                <input type="text"
                       name="source_{{ i }}_blacklisted_title_keywords"
                       value="{{ source.filters.blacklisted_title_keywords | join(', ') if source.filters.blacklisted_title_keywords else '' }}"
                       placeholder="e.g. untitled, barbie"
                       aria-describedby="btk-help-{{ i }}">
                <small id="btk-help-{{ i }}">Comma-separated keywords to exclude from titles</small>
            </label>
            <label class="field-label">
                Blacklisted TVDB IDs
                <input type="text"
                       name="source_{{ i }}_blacklisted_tvdb_ids"
                       value="{{ source.filters.blacklisted_tvdb_ids | join(', ') if source.filters.blacklisted_tvdb_ids else '' }}"
                       placeholder="e.g. 79274, 85287"
                       aria-describedby="btids-help-{{ i }}">
                <small id="btids-help-{{ i }}">Comma-separated TVDB IDs to exclude</small>
            </label>
        </div>
        <div class="source-grid">
            <label class="field-label">
                Allowed Countries
                <input type="text"
                       name="source_{{ i }}_allowed_countries"
                       value="{{ source.filters.allowed_countries | join(', ') if source.filters.allowed_countries else '' }}"
                       placeholder="e.g. us, gb, ca"
                       aria-describedby="ac-help-{{ i }}">
                <small id="ac-help-{{ i }}">Only allow shows from these countries (empty = any). Use 'ignore' to include shows with no country</small>
            </label>
            <label class="field-label">
                Allowed Languages
                <input type="text"
                       name="source_{{ i }}_allowed_languages"
                       value="{{ source.filters.allowed_languages | join(', ') if source.filters.allowed_languages else '' }}"
                       placeholder="e.g. en, ja"
                       aria-describedby="al-help-{{ i }}">
                <small id="al-help-{{ i }}">Only allow shows with these languages (empty = any). Use 'ignore' to include shows with no language</small>
            </label>
        </div>
    </div>

    <div id="preview-{{ i }}"></div>
</div>

<script>
function toggleSourceFields(select, index) {
    var fields = document.getElementById('source_' + index + '_user_list_fields');
    if (select.value === 'user_list') {
        fields.classList.remove('is-hidden');
    } else {
        fields.classList.add('is-hidden');
    }
}
</script>
